# Local PostgreSQL for development (matches Render production provider).
# Start: docker compose up -d
# DATABASE_URL=postgresql://postgres:postgres@localhost:5432/hub?schema=public
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hub
    volumes:
      - hub_pgdata:/var/lib/postgresql/data

volumes:
  hub_pgdata:
