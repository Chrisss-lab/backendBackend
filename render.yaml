# Render Blueprint (optional): Web Service + PostgreSQL
# Adjust repo URL and branch in the Render dashboard when you connect Git.
services:
  - type: web
    name: hub-api
    runtime: node
    rootDir: .
    # migrate runs at start so build does not require DATABASE_URL (set DB + link env before first boot).
    buildCommand: npm ci && npm run build -w packages/shared && npm run prisma:generate -w apps/api && npm run build -w apps/api
    startCommand: npm run render:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hub-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # R2 (set in dashboard; do not commit secrets):
      # R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET, STORAGE_PUBLIC_BASE_URL

databases:
  - name: hub-postgres
    databaseName: hub
    user: hub
